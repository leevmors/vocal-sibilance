name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build

      - name: Configure (macOS universal)
        if: runner.os == 'macOS'
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF_NAME.TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="$v" packaging\windows-installer.iss

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: bash packaging/make-macos-pkg.sh "${GITHUB_REF_NAME#v}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/Output/*.exe
            VocalSibilance-*-macOS.pkg
